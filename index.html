<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI Tumor Detection</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS (recommended in production) -->
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f6f9;
        }

        .app-container {
            max-width: 640px;
            margin: auto;
        }

        .card {
            border-radius: 12px;
        }

        .preview-img {
            max-height: 350px;
            object-fit: contain;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
<main class="app-container mt-5">

    <!-- Header -->
    <header class="text-center mb-4">
        <h1 class="fw-bold text-primary">MRI Tumor Detection</h1>
        <p class="text-muted">
            Upload an MRI scan to classify tumor presence and type.
        </p>
    </header>

    <!-- Upload Form -->
    <section class="card shadow-sm p-4">
        <form method="POST" enctype="multipart/form-data" novalidate>

            <!-- CSRF (Flask/Django integration expected) -->
            {% if csrf_token %}
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            {% endif %}

            <div class="mb-3">
                <label for="file" class="form-label">MRI Image</label>
                <input 
                    type="file" 
                    class="form-control" 
                    id="file" 
                    name="file" 
                    accept="image/png, image/jpeg"
                    required
                >
                <div class="invalid-feedback">
                    Please upload a valid MRI image.
                </div>
            </div>

            <button id="submitBtn" type="submit" class="btn btn-primary w-100">
                Detect Tumor
            </button>

        </form>
    </section>

    <!-- Loading Indicator -->
    <div id="loading" class="text-center mt-3 hidden">
        <div class="spinner-border text-primary"></div>
        <p class="mt-2">Processing image...</p>
    </div>

    <!-- Results -->
    {% if result %}
    <section id="results" class="mt-4" aria-live="polite">
        <div class="card shadow-sm">
            <div class="card-body text-center">

                <h4 class="text-success">{{ result | e }}</h4>

                <p class="text-muted">
                    Confidence: <strong>{{ confidence }}%</strong>
                </p>

                <img 
                    src="{{ file_path | e }}" 
                    class="img-fluid rounded preview-img" 
                    alt="Uploaded MRI scan"
                >
            </div>
        </div>
    </section>
    {% endif %}

</main>

<!-- Scripts -->
<script>
    const form = document.querySelector("form");
    const loading = document.getElementById("loading");
    const button = document.getElementById("submitBtn");

    form.addEventListener("submit", () => {
        loading.classList.remove("hidden");
        button.disabled = true;
        button.innerText = "Processing...";
    });
</script>

</body>
</html>
